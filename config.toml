[app]
name = "Seacraft ASR Service"
version = "1.1.8"
env = "prod"

[server]
host = "0.0.0.0"
port = 8081
reload = false
workers = 1

[logging]
level = "INFO"
log_dir = "./logs"
file_name = "app.log"
max_bytes = 10485760
backup_count = 10

[storage]
tmp_dir = "./tmp_audio"
chunk_size = 1048576

[asr]
max_concurrent_requests = 20
max_queue_size = 10

[asr.paraformer]
executable = "./bin/sherpa-onnx-vad-with-offline-asr"
# 可用绝对路径；换机器时改成该机上 sherpa-onnx 的 CMake build 目录
working_dir = "/root/workspaces/zhangs/sherpa-onnx/build"
provider = "ascend"
num_threads = 2
# 与 build/model 下实际布局一致（vad 子目录）
silero_vad_model = "./model/vad/silero_vad.onnx"
silero_vad_threshold = 0.45 
silero_vad_min_silence_duration = 0.15
paraformer = "./model/p-8.2-0328/encoder.om,model/p-8.2-0328/predictor.om,model/p-8.2-0328/decoder.om"
tokens = "./model/p-8.2-0328/tokens.txt"
command_timeout_seconds = 7200

[asr.sensevoice]
executable = "./bin/sherpa-onnx-vad-with-offline-asr"
working_dir = "/root/workspaces/zhangs/sherpa-onnx/build"
provider = "ascend"
num_threads = 2
silero_vad_model = "./model/vad/silero_vad.onnx"
silero_vad_threshold = 0.45 
silero_vad_min_silence_duration = 0.15
sense_voice_model = "./model/s-8.2-0717/model.om"
tokens = "./model/s-8.2-0717/tokens.txt"
command_timeout_seconds = 7200

[punctuation_cli]
executable = "./bin/sherpa-onnx-offline-punctuation"
working_dir = "/root/workspaces/zhangs/sherpa-onnx/build"
ct_transformer = "./model/punc-0412/model.int8.onnx"

[audio_metrics]
# ffmpeg 可放在系统 PATH，也可配置为 conda 环境里的绝对路径
ffmpeg_executable = "ffmpeg"
decode_sample_rate = 16000
analysis_frame_ms = 100
db_floor = -60.0
command_timeout_seconds = 300